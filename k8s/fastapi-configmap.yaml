apiVersion: v1
kind: ConfigMap
metadata:
  name: team5-fastapi-config
  namespace: skala3-finalproj-class2-team5
  labels:
    app: team5-fastapi
data:
  FASTAPI_PORT: "8001"
  POSTGRES_HOST: team5-postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: safety
  QDRANT_URL: http://team5-qdrant:6333
  SAFETY_DOC_QDRANT_URL: http://team5-qdrant:6333
  APP_MINIO_ENDPOINT: http://team5-minio:9000
  APP_MINIO_BUCKET: safety-files
  APP_MINIO_PUBLIC_ENDPOINT: http://team5-minio:9000
  S3_PUBLIC_ENDPOINT_URL: http://team5-minio:9000
  S3_PRESIGNED_URL_EXPIRE_SECONDS: "900"
  AWS_REGION: ap-northeast-2
  OPENAI_CHAT_MODEL: gpt-4.1-mini
  OPENAI_MODEL: gpt-4.1-mini
  OPENAI_REPORT_MODEL: gpt-4.1
  OPENAI_EMBEDDING_MODEL: text-embedding-3-small
  LANGSMITH_TRACING: "false"
  THRESHOLD_MATCHED: "0.85"
  THRESHOLD_REVIEW: "0.75"
  VISION_AGENT_BASE_URL: http://team5-vision:8002
  VISION_AGENT_REVIEW_PATH: /vision/review
  VISION_AGENT_TIMEOUT_SECONDS: "60"
