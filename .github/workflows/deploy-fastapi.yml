name: Deploy FastAPI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "vision/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

env:
  IMAGE_NAME: team5-fastapi
  DEPLOY_MANIFEST: k8s/fastapi/fastapi-deployment.yaml

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: image
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          IMAGE_URI="${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.image_uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout deploy repository
        uses: actions/checkout@v4
        with:
          repository: SKALA-TEAM5/deploy
          ref: main
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: deploy-repo

      - name: Update deploy image tag
        working-directory: deploy-repo
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
          DEPLOY_MANIFEST: ${{ env.DEPLOY_MANIFEST }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          manifest = Path(os.environ["DEPLOY_MANIFEST"])
          image_uri = os.environ["IMAGE_URI"]
          text = manifest.read_text()
          lines = [
              f"{line.split('image:')[0]}image: {image_uri}" if "image:" in line and "team5-fastapi" in line else line
              for line in text.splitlines()
          ]
          manifest.write_text("\n".join(lines) + "\n")
          PY

      - name: Create deploy pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: deploy-repo
          branch: chore/update-fastapi-${{ steps.image.outputs.image_tag }}
          title: "chore(deploy): update fastapi image to ${{ steps.image.outputs.image_tag }}"
          commit-message: "chore(deploy): update fastapi image to ${{ steps.image.outputs.image_tag }}"
          body: |
            Update `team5-fastapi` image to `${{ steps.image.outputs.image_uri }}`.